<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChemiaNiemieckaTania</title>
    <style>
        body { font-family: sans-serif; background-color: #121214; color: #e1e1e6; margin: 0; padding: 0; }
        nav { background-color: #202024; padding: 15px; display: flex; justify-content: center; gap: 20px; position: sticky; top: 0; z-index: 999; }
        nav button { background: none; border: 2px solid transparent; color: #e1e1e6; padding: 10px; cursor: pointer; font-weight: bold; }
        nav button.aktywny { border-bottom: 2px solid #00e676; color: #00e676; }
        .zawartosc { max-width: 1000px; margin: auto; padding: 20px; }
        .sekcja { display: none; }
        .sekcja.aktywna { display: block; }
        .katalog-siatka { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .produkt-karta { background-color: #202024; padding: 15px; border-radius: 8px; border: 1px solid #29292e; }
        .btn-akcja { background-color: #00e676; color: #121214; border: none; padding: 10px; width: 100%; cursor: pointer; border-radius: 5px; font-weight: bold; }
        .grupa-formularza { margin-bottom: 15px; }
        .grupa-formularza input, .grupa-formularza textarea { width: 100%; padding: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

    <nav>
        <button id="btn-cennik" class="aktywny" onclick="zmienSekcje('cennik')">Sklep</button>
        <button id="btn-koszyk" onclick="zmienSekcje('koszyk')">Koszyk (<span id="koszyk-licznik">0</span>)</button>
        <button id="btn-status" onclick="zmienSekcje('status')">Status</button>
    </nav>

    <div class="zawartosc">
        <div id="sekcja-cennik" class="sekcja aktywna">
            <h1>Katalog</h1>
            <div id="katalog-pojemnik" class="katalog-siatka">Ładowanie...</div>
        </div>

        <div id="sekcja-koszyk" class="sekcja">
            <h1>Koszyk</h1>
            <div id="koszyk-lista-elementow"></div>
            <form id="formularz-zamowienia" onsubmit="wyslijZamowienie(event)">
                <div class="grupa-formularza"><input type="text" id="klient-nazwa" placeholder="Imię i nazwisko" required></div>
                <div class="grupa-formularza"><textarea id="klient-adres" placeholder="Adres" required></textarea></div>
                <button type="submit" class="btn-akcja">Zamów</button>
            </form>
        </div>

        <div id="sekcja-status" class="sekcja">
            <h1>Sprawdź status</h1>
            <input type="text" id="input-kod-zamowienia" placeholder="Wpisz kod zamówienia">
            <button class="btn-akcja" onclick="sprawdzStatusZamowienia()">Sprawdź</button>
            <div id="wynik-statusu"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
</body>
</html>
